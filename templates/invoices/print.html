{% load i18n core_tags %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ invoice.number }} · {% trans "Invoice" %}</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f6f7fb;color:#18212f;font-family:Inter,system-ui,"Noto Sans CJK SC",Arial,sans-serif}.print-toolbar{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;gap:14px;align-items:center;padding:14px 24px;background:#fff;border-bottom:1px solid #e8ebf0}.print-toolbar strong{display:block}.print-toolbar small{color:#718096}.print-actions{display:flex;gap:10px;align-items:center}.print-actions a,.print-actions button{border:1px solid #d6dae2;border-radius:8px;background:#fff;color:#18212f;padding:10px 14px;text-decoration:none;cursor:pointer}.print-actions button.primary{background:#6956e8;color:#fff;border-color:#6956e8}.print-wrap{padding:28px}@media print{.print-toolbar{display:none!important}.print-wrap{padding:0;background:#fff}}
  </style>
  {% include 'invoices/_sheet_styles.html' %}
</head>
<body>
  <div class="print-toolbar no-print">
    <div>
      <strong>{{ invoice.number }}</strong>
      <small>{% trans "Print invoice" %} / {% trans "Save as PDF" %}</small>
    </div>
    <div class="print-actions">
      <a href="{% url 'invoice_detail' invoice.pk %}">{% trans "Back" %}</a>
      <button class="primary" type="button" onclick="window.print()">⌁ {% trans "Print invoice" %}</button>
    </div>
  </div>
  <main class="print-wrap">
    {% include 'invoices/_sheet.html' %}
  </main>
</body>
</html>
